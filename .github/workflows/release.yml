name: Release

# Publishes platform-specific VSIXes to the VS Code Marketplace and Open VSX
# (Cursor installs from Open VSX). Trigger by pushing a version tag:
#   git tag v0.2.0 && git push origin v0.2.0
#
# Required repository secrets:
#   VSCE_PAT  - Azure DevOps personal access token (Marketplace > Manage scope)
#   OVSX_PAT  - open-vsx.org access token
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: macos-latest
    strategy:
      # Parallel jobs race to create the extension on first publish and fail
      # with "already exists" — publish one target at a time.
      max-parallel: 1
      matrix:
        target:
          - darwin-arm64
          - linux-x64
          - linux-arm64
          - win32-x64
          - win32-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run lint && npm run typecheck && npm test

      - name: Build (production, target-specific binaries)
        run: node esbuild.mjs --production
        env:
          NOAT_TARGET: ${{ matrix.target }}

      - name: Package
        run: npx vsce package --target ${{ matrix.target }}

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --packagePath *.vsix --skip-duplicate
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        # Runs even if the Marketplace step failed so one registry's hiccup
        # doesn't block the other.
        if: ${{ !cancelled() }}
        run: npx ovsx publish *.vsix -p "$OVSX_PAT" --skip-duplicate
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: noat-${{ matrix.target }}
          path: '*.vsix'
